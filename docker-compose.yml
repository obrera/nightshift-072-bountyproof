services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - BOUNTYPROOF_PUBLIC_BASE_URL
      - BOUNTYPROOF_DEVNET_RPC_URL
      - BOUNTYPROOF_DEVNET_WS_URL
      - BOUNTYPROOF_DEVNET_SIGNER_KEYPAIR
      - BOUNTYPROOF_COLLECTION_ADDRESS
      - BOUNTYPROOF_OPERATOR_WALLETS
      - BOUNTYPROOF_DATA_PATH
      - PORT
    networks:
      - default
      - dokploy-network
    restart: unless-stopped
    volumes:
      - bountyproof-data:/app/data

networks:
  dokploy-network:
    external: true

volumes:
  bountyproof-data:
